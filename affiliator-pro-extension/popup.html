<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Affiliator Pro Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 11px;
            text-align: center;
            color: #888;
            margin-bottom: 15px;
        }

        .status {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .status.captured {
            border: 1px solid #10b981;
        }

        .status.waiting {
            border: 1px solid #f59e0b;
        }

        .status-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
        }

        .token-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #10b981;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-copy {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff;
        }

        .btn-copy:hover {
            opacity: 0.9;
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
        }

        .instructions {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            line-height: 1.6;
        }

        .instructions a {
            color: #00d4ff;
        }

        .time {
            font-size: 10px;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h1>🔐 Affiliator Pro Client</h1>
    <p class="subtitle">v2.1.0 - affiliator.pro extension</p>

    <div id="status" class="status waiting">
        <div class="status-icon">⏳</div>
        <div class="status-text">Menunggu Token...</div>
    </div>

    <div id="token-container" style="display:none;">
        <div id="token-box" class="token-box"></div>
        <button id="copy-btn" class="btn btn-copy">📋 Copy Token</button>
        <div id="time" class="time"></div>
    </div>

    <button id="refresh-btn" class="btn btn-refresh">🔄 Refresh Status</button>

    <div class="instructions">
        <strong>Cara pakai:</strong><br>
        1. Buka <a href="https://labs.google/fx/tools/flow" target="_blank">labs.google/fx/tools/flow</a><br>
        2. Pastikan sudah login akun Google<br>
        3. Token otomatis tercapture!<br>
        4. Copy dan paste ke Affiliator Pro<br>
    </div>

    <script src="popup.js"></script>
</body>

</html>
